<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account TopUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: rgba(0,0,0,0.5); }
        .modal { background: #f0f9ff; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="modal w-full max-w-md rounded-3xl overflow-hidden shadow-2xl border border-sky-200">
        <div class="p-5 border-b border-sky-100">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-900">Account TopUp</h3>
                <button onclick="window.location.href='dashboard.html'" class="text-slate-400 hover:text-slate-600">
    <i data-lucide="x" class="w-6 h-6"></i>
                
                    
                </button>
            </div>
        </div>
        
        <div class="p-5 space-y-5">
            <div>
                <label class="text-sm text-slate-500">Amount</label>
                <input type="number" value="100.00" class="w-full mt-1 px-4 py-3 border border-sky-200 rounded-2xl focus:outline-none focus:border-blue-500 text-lg bg-white">
            </div>
            <div>
                <label class="text-sm text-slate-500">Deposit to</label>
                <select class="w-full mt-1 px-4 py-3 border border-sky-200 rounded-2xl focus:outline-none focus:border-blue-500 bg-white">
                    <option>funding - 0.00</option>
                </select>
            </div>
            <div>
                <label class="text-sm text-slate-500">Select Payment Method</label>
                <select class="w-full mt-1 px-4 py-3 border border-sky-200 rounded-2xl focus:outline-none focus:border-blue-500 bg-white">
                    <option>-- Select a Payment Method --</option>
                </select>
            </div>
            <div class="border-2 border-dashed border-sky-300 rounded-2xl p-8 text-center bg-white">
                <i data-lucide="upload-cloud" class="w-10 h-10 mx-auto text-sky-400"></i>
                <p class="text-sm text-slate-600 mt-2">Click or Drag & Drop</p>
                <p class="text-xs text-slate-400">JPEG/PNG Only</p>
            </div>

            <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-semibold">Paid</button>
            <button onclick="window.location.href='dashboard.html'" class="w-full text-slate-600 py-4 font-medium">
    Cancel
            </button>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
