  .glass-card {

    border: 1px solid rgba(255, 215, 0, 0.1);

  .gradient-text {
    background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .shimmer {
    animation: shimmer 2s infinite;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    background-size: 200% 100%;
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .sparkline {
    width: 60px;
    height: 32px;
  }
  .ascend {
    animation: slideIn 0.4s ease-out forwards;
  }
  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .ripple {
    position: relative;
    overflow: hidden;
  }
  .ripple::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 215, 0, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.4s, height 0.4s;
  }
  .ripple:active::after {
    width: 300px;
    height: 300px;
  }
  ::-webkit-scrollbar {
    width: 0px;

    XRP: `<svg viewBox="0 0 32 32" fill="#23292F"><circle cx="16" cy="16" r="16"/><path d="M16 8l-8 8 8 8 8-8-8-8zm0 10.8l-2.8-2.8 2.8-2.8 2.8-2.8 2.8z" fill="white"/></svg>`
  };
  return icons[symbol] || icons.BTC;
};

// Utils
const formatCurrency = (num) => {
  if (balanceHidden) return '••••••';
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }).format(num);
};

const formatNumber = (num, decimals = 2) => {
  return new Intl.NumberFormat('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  }).format(num);
};

const formatPercent = (num) => {
  const formatted = formatNumber(Math.abs(num), 2);
  return num >= 0 ? `+${formatted}%` : `-${formatted}%`;
};

const showToast = (message) => {
  const toast = document.getElementById('toast');
  const toastMessage = document.getElementById('toastMessage');
  toastMessage.textContent = message;
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(-20px)';
  }, 3000);
};

// Fetch CoinGecko Prices
const fetchPrices = async () => {
  try {
    const ids = Object.keys(COIN_INFO).join(',');
    const response = await fetch(
      `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`
    );
    if (!response.ok) throw new Error('Failed to fetch prices');
    const data = await response.json();
    priceData = data;
    return data;
  } catch (error) {
    console.error('Error fetching prices:', error);
    showToast('Failed to update prices');
    return null;
  }
};

// Generate Sparkline SVG
const generateSparkline = (isPositive) => {
  const points = [];
  let value = 50;
  for (let i = 0; i < 20; i++) {
    value += (Math.random() - 0.5) * 20;
    value = Math.max(10, Math.min(90, value));
    points.push(`${i * 3},${100 - value}`);
  }
  const pathData = `M ${points.join(' L ')}`;
  const color = isPositive ? '#10B981' : '#EF4444';
  return `
    <svg class="sparkline" viewBox="0 0 60 100" preserveAspectRatio="none">
      <path d="${pathData}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  `;
};

// Render Holdings
const renderHoldings = () => {
  const holdingsList = document.getElementById('holdingsList');
  
  if (userHoldings.length === 0) {
    holdingsList.innerHTML = `
      <div class="glass-card rounded-xl p-8 text-center">
        <svg class="w-16 h-16 mx-auto mb-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 12H4m8-8v16m-4-8h8"></path>
        </svg>
        <p class="text-gray-400 mb-3">No crypto holdings yet</p>
        <button class="px-6 py-2 rounded-xl gradient-yellow text-dark-bg font-semibold text-sm active:scale-95 transition">
          Buy Crypto
        </button>
      </div>
    `;
    return;
  }

  const holdingsHTML = userHoldings.map(holding => {
    const coinId = holding.id;
    const coinPrice = priceData[coinId]?.usd || 0;
    const change24h = priceData[coinId]?.usd_24h_change || 0;
    const value = holding.amount * coinPrice;
    const isPositive = change24h >= 0;
    const info = COIN_INFO[coinId];
    
    return `
      <div class="glass-card rounded-xl p-4 hover:bg-white/5 transition cursor-pointer ascend">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full flex-shrink-0">
            ${getCryptoIcon(info.symbol)}
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-0.5">
              <h4 class="font-semibold text-sm truncate">${info.name}</h4>
              <span class="text-xs text-gray-500">${info.symbol}</span>
            </div>
            <p class="text-xs text-gray-400">${formatNumber(holding.amount, 6)} ${info.symbol}</p>
          </div>
          <div class="text-right">
            <p class="font-bold text-sm mb-0.5">${formatCurrency(value)}</p>
            <div class="flex items-center justify-end gap-1">
              <svg class="w-3 h-3 ${isPositive ? 'text-green-400' : 'text-red-400 rotate-180'}" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 3l7 7H3l7-7z"/>
              </svg>
              <span class="text-xs font-semibold ${isPositive ? 'text-green-400' : 'text-red-400'}">${formatPercent(change24h)}</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  
  holdingsList.innerHTML = holdingsHTML;
};

// Render Live Prices
const renderLivePrices = () => {
  const livePricesList = document.getElementById('livePricesList');
  const coins = Object.keys(COIN_INFO);
  
  const pricesHTML = coins.map(coinId => {
    const info = COIN_INFO[coinId];
    const data = priceData[coinId];
    if (!data) return '';
    
    const price = data.usd || 0;
    const change24h = data.usd_24h_change || 0;
    const isPositive = change24h >= 0;
    
    return `
      <div class="glass-card rounded-xl p-4 hover:bg-white/5 transition cursor-pointer ascend">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full flex-shrink-0">
            ${getCryptoIcon(info.symbol)}
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-0.5">
              <h4 class="font-semibold text-sm">${info.name}</h4>
              <span class="text-xs text-gray-500">${info.symbol}</span>
            </div>
            <p class="text-xs text-gray-400 font-medium">${formatCurrency(price)}</p>
          </div>
          ${generateSparkline(isPositive)}
          <div class="text-right ml-2">
            <div class="px-2.5 py-1 rounded-lg ${isPositive ? 'bg-green-500/10' : 'bg-red-500/10'}">
              <span class="text-xs font-bold ${isPositive ? 'text-green-400' : 'text-red-400'}">${formatPercent(change24h)}</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  
  livePricesList.innerHTML = pricesHTML;
};

// Update Total Balance
const updateTotalBalance = () => {
  let total = userBalance || 0;
  let totalInvested = 0;
  
  userHoldings.forEach(holding => {
    const coinPrice = priceData[holding.id]?.usd || 0;
    total += holding.amount * coinPrice;
    totalInvested += holding.costBasis || 0;
  });
  
  const pnl = total - totalInvested;
  const roi = totalInvested > 0 ? (pnl / totalInvested) * 100 : 0;
  const change24h = 2.34; // Would calculate from historical data
  
  document.getElementById('totalBalance').textContent = formatCurrency(total);
  document.getElementById('totalInvested').textContent = formatCurrency(totalInvested);
  document.getElementById('totalPnl').textContent = formatCurrency(pnl);
  document.getElementById('totalPnl').className = `text-sm font-semibold ${pnl >= 0 ? 'text-green-400' : 'text-red-400'}`;
  document.getElementById('totalRoi').textContent = formatPercent(roi);
  document.getElementById('totalRoi').className = `text-sm font-semibold ${roi >= 0 ? 'text-green-400' : 'text-red-400'}`;
  document.getElementById('balanceChange').textContent = formatPercent(change24h);
  document.getElementById('balanceChange').className = `text-sm font-semibold px-2 py-1 rounded-lg ${change24h >= 0 ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`;
};

// Fetch User Data
const fetchUserData = async (uid) => {
  try {
    // Fetch user document
    const userDoc = await getDoc(doc(db, 'users', uid));
    if (userDoc.exists()) {
      const data = userDoc.data();
      userBalance = data.balance || 0;
      
      // Update avatar initials
      const name = data.name || 'User';
      const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('userAvatar').textContent = initials;
    }
    
    // Fetch holdings
    const holdingsSnapshot = await getDocs(collection(db, 'users', uid, 'holdings'));
    userHoldings = [];
    holdingsSnapshot.forEach(doc => {
      userHoldings.push({ id: doc.id, ...doc.data() });
    });
    
  } catch (error) {
    console.error('Error fetching user data:', error);
    showToast('Failed to load user data');
  }
};

// Initialize
const init = async () => {
  // Fetch prices first
  await fetchPrices();
  renderLivePrices();
  
  // Auto-refresh prices every 30 seconds
  priceUpdateInterval = setInterval(async () => {
    await fetchPrices();
    renderLivePrices();
    renderHoldings();
    updateTotalBalance();
  }, 30000);
};

// Auth State Listener
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    await fetchUserData(user.uid);
    renderHoldings();
    updateTotalBalance();
    showToast(`Welcome back!`);
  } else {
    showToast('Please log in to view your assets');
    // Redirect to login if needed
    // window.location.href = 'login.html';
  }
});

// Event Listeners
document.getElementById('toggleVisibility').addEventListener('click', () => {
  balanceHidden = !balanceHidden;
  document.getElementById('eyeOpen').classList.toggle('hidden');
  document.getElementById('eyeClosed').classList.toggle('hidden');
  updateTotalBalance();
  renderHoldings();
});

document.getElementById('refreshBtn').addEventListener('click', async () => {
  const btn = document.getElementById('refreshBtn');
  btn.style.transform = 'rotate(360deg)';
  btn.style.transition = 'transform 0.5s';
  setTimeout(() => {
    btn.style.transform = 'rotate(0deg)';
  }, 500);
  
  showToast('Refreshing...');
  await fetchPrices();
  if (currentUser) await fetchUserData(currentUser.uid);
  renderHoldings();
  renderLivePrices();
  updateTotalBalance();
});

document.querySelectorAll('.quickActionBtn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    const action = e.currentTarget.dataset.action;
    showToast(`${action.charAt(0).toUpperCase() + action.slice(1)} feature coming soon`);
  });
});

document.getElementById('notifBtn').addEventListener('click', () => {
  showToast('No new notifications');
});

document.getElementById('settingsBtn').addEventListener('click', () => {
  showToast('Settings coming soon');
});

// Start
init();
</script>
