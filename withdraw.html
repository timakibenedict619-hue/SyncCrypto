<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root { --color-purple-btn: #5B3FD3; }
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-black/60 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-3xl p-6 shadow-2xl">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-bold text-slate-900">Withdraw Funds</h3>
            <button onclick="window.close()" class="p-2 rounded-lg hover:bg-slate-100">
                <i data-lucide="x" class="w-5 h-5 text-slate-500"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="text-sm mb-2 block text-slate-500">Amount</label>
                <input type="number" value="100.00" class="w-full px-4 py-3 rounded-2xl border-2 text-lg font-semibold focus:outline-none focus:border-blue-500" style="background: #F8FAFC; border-color: #E2E8F0;">
            </div>
            <div>
                <label class="text-sm mb-2 block text-slate-500">Withdraw From</label>
                <select class="w-full px-4 py-3 rounded-2xl border-2 focus:outline-none focus:border-blue-500" style="background: #F8FAFC; border-color: #E2E8F0;">
                    <option>Funding - $0.00</option>
                    <option>Trading - $0.00</option>
                    <option>Bonus - $50.00</option>
                </select>
            </div>
            <div>
                <label class="text-sm mb-2 block text-slate-500">Select Payment Method</label>
                <select class="w-full px-4 py-3 rounded-2xl border-2 focus:outline-none focus:border-blue-500" style="background: #F8FAFC; border-color: #E2E8F0;">
                    <option>Bank Transfer</option>
                    <option>Crypto Wallet</option>
                    <option>PayPal</option>
                </select>
            </div>
            <button class="w-full py-4 rounded-2xl text-white font-semibold" style="background-color: #5B3FD3;">Withdraw</button>
            <button onclick="window.close()" class="w-full py-4 rounded-2xl font-semibold bg-slate-100 text-slate-700">Cancel</button>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
